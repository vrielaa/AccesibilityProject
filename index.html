<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Website about plants" />
    <title>Accessibility</title>
    <link rel="stylesheet" href="./dist/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="grid grid-cols-2 px-[5rem] py-[2rem]">
      <div class="flex w-full justify-between">
        <a href="/" aria-label="Home page" class="logo">
          <img src="./assets/logo.png" alt="Logo" />
        </a>

        <nav aria-label="Main navigation" class="mr-[44rem] flex items-center">
          <ul
            class="flex items-center font-['Outfit'] text-[18px] leading-[150%] font-normal tracking-normal"
          >
            <li class="border-r border-slate-600 pr-4">
              <a href="#" class="focus:outline-2 focus:outline-offset-4">About Us</a>
            </li>
            <li class="border-r border-slate-600 px-4">
              <a href="#" class="focus:outline-2 focus:outline-offset-4">Contact Us</a>
            </li>
            <li class="border-r border-slate-600 px-4">
              <a href="#" class="focus:outline-2 focus:outline-offset-4">Blog</a>
            </li>
            <li class="border-r border-slate-600 px-4">
              <a href="#" class="focus:outline-2 focus:outline-offset-4">Site Map</a>
            </li>
            <li class="pl-4">
              <a href="#" class="focus:outline-2 focus:outline-offset-4">Eng</a>
            </li>
          </ul>
        </nav>
      </div>
      <form
        role="search"
        aria-label="Site search"
        class="flex h-[4.8rem] w-[42.4rem] ml-auto items-center border border-emerald-900 bg-white"
      >
        <label for="site-search" class="sr-only">Search this site</label>

        <input
          id="site-search"
          name="query"
          type="search"
          placeholder="Search this site"
          class="min-w-0 flex-1 px-3 align-middle font-['Outfit'] text-[18px] leading-[26px] font-normal tracking-normal outline-none"
        />

        <button
          type="submit"
          aria-label="Search Button"
          class="flex h-full items-center justify-center bg-emerald-900 text-white focus:outline-2 focus:outline-offset-2 focus:outline-emerald-900"
        >
          <img src="./assets/search_button.png" alt="" aria-hidden="true" />
        </button>
      </form>
    </header>
  </body>
</html>
